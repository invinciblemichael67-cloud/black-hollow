<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Black Hollow: The Gallows Mystery</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- TITLE SCREEN -->

<div id="titleScreen">

    <h1>BLACK HOLLOW</h1>

    <h2>The Gallows Mystery</h2>

    <button id="startButton">
        Begin Investigation
    </button>

</div>

<!-- GAME -->

<div id="gameScreen" class="hidden">

<header>

<h1>BLACK HOLLOW</h1>

<div id="caseNumber">

Case #001

</div>

</header>

<div id="mainLayout">

<!-- LEFT PANEL -->

<aside id="leftPanel">

<h2>Sheriff Crowe</h2>

<div id="portrait">

👮

</div>

<h3>Objective</h3>

<p>

Investigate Cell 7.

</p>

</aside>

<!-- CENTER -->

<main id="centerPanel">

<div id="scene">

<img
id="sceneImage"
src="assets/backgrounds/jail_room.png"
alt="Jail Room">

<button class="hotspot desk" id="deskSpot"></button>

<button class="hotspot door" id="doorSpot"></button>

<button class="hotspot cell" id="cellSpot"></button>

<button class="hotspot window" id="windowSpot"></button>

</div>

<div id="dialogueBox">

<div id="speaker">

Sheriff Crowe

</div>

<div id="dialogue">

Click Begin Investigation to start your case.

</div>

</div>

</main>

<!-- RIGHT PANEL -->

<aside id="rightPanel">

<h2>Notebook</h2>

<ul id="notes">

<li>No evidence collected.</li>

</ul>

</aside>

</div>

<footer>

<h3>Inventory</h3>

<div id="inventory">

<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>

</div>

</footer>

</div>

<script src="game.js"></script>

</body>

</html>
