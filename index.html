<title>Black Hollow: The Jail Mystery</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="titleScreen">

<h2>The Jail Mystery</h2>

<p>October, 1888</p>

<button id="startButton">

Black Hollow Jail
</div>

</div>

</div>

<img
id="roomImage"

You arrive at the abandoned jail...

Something feels wrong.

Click around to investigate.

</div>

</div>

<div id="buttons">

<button onclick="inspectDesk()">

Desk

</button>

<button onclick="inspectCell()">

Cell 7

</button>

</button>

</div>

</div>
